services:
  instabridge-api:
    build:
      context: .
      dockerfile: Dockerfile.production
    ports:
      - "5050:5050"
    env_file:
      - ./.env
    depends_on:
      - redis
    networks:
      - instabridge-network

  redis:
    image: redis:7.0
    restart: always
    volumes:
      - ./volumes/redis:/data
    networks:
      - instabridge-network
    ports:
      - "6379:6379"

networks:
  instabridge-network:
    name: instabridge-network
